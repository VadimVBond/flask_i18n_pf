{% block blog %}
  <!-- ======= секция блога======= -->
  <section id="blog" class="portfolio">
    <div class="container">
      <div class="section-title">
        <h2>{{ t('blog_title') }}</h2>
        <p>{{ t('blog_subtitle') }}</p>
      </div>
      <div class="row">
        <div class="col-lg-12 d-flex justify-content-center">
          <ul id="portfolio-flters">
            <li data-filter="*" class="filter-active">{{ t('tags') }}</li>
            {% for tag in tags %}
              <li data-filter=".{{ tag }}">{{ tag }}</li>
            {% endfor %}
          </ul>
        </div>
      </div>
      <div class="row portfolio-container">
        {% for post in posts %}
          <div class="col-lg-4 col-md-6 portfolio-item {{ post.tag }}">
            <div class="portfolio-wrap">
              <img src="{{ url_for('static', filename='img/portfolio/portfolio-1.jpg') }}"
                   class="img-fluid"
                   alt="">
              <div class="portfolio-info">
                <h4>
                  <a href="{{ url_for('main.blog', lang=lang, name=post.path.split('/')[-1]) }}"
                     data-gallery="blogDetailsGallery"
                     data-glightbox="type: external"
                     class="portfolio-details-lightbox">{{ post.meta.title }}</a>
                </h4>
                <p>{{ post.description }}</p>
                <div class="portfolio-links">
                  <a href="{{ url_for('main.blog', lang=lang, name=post.path.split('/')[-1]) }}"
                     data-gallery="blogDetailsGallery"
                     data-glightbox="type: external"
                     class="portfolio-details-lightbox"><i class="bx bx-caret-down-circle" style="padding-top: 15px"></i></a>
                </div>
              </div>
            </div>
          </div>
        {% endfor %}
      </div>
    </div>
  </section><!-- конец блога -->
{% endblock %}
