{% block skills %}
  <!-- ======= Технические скиллы  ======= -->
  <div class="skills container">
    <div class="section-title">
      <h2>{{ t('skills') }}</h2>
    </div>
    <div class="row skills-content">
      <div class="col-lg-6">
        <div class="progress">
          <span class="skill">HTML & CSS & Javascript<i class="val">80%</i></span>
          <div class="progress-bar-wrap">
            <div class="progress-bar"
                 role="progressbar"
                 aria-valuenow="80"
                 aria-valuemin="0"
                 aria-valuemax="80"></div>
          </div>
        </div>
        <div class="progress">
          <span class="skill">ReactJS <i class="val">100%</i></span>
          <div class="progress-bar-wrap">
            <div class="progress-bar"
                 role="progressbar"
                 aria-valuenow="90"
                 aria-valuemin="0"
                 aria-valuemax="100"></div>
          </div>
        </div>
        <div class="progress">
          <span class="skill">NextJS <i class="val">100%</i></span>
          <div class="progress-bar-wrap">
            <div class="progress-bar"
                 role="progressbar"
                 aria-valuenow="75"
                 aria-valuemin="0"
                 aria-valuemax="100"></div>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="progress">
          <span class="skill">Python <i class="val">98%</i></span>
          <div class="progress-bar-wrap">
            <div class="progress-bar"
                 role="progressbar"
                 aria-valuenow="100"
                 aria-valuemin="0"
                 aria-valuemax="100"></div>
          </div>
        </div>
        <div class="progress">
          <span class="skill">Tailwind <i class="val">95%</i></span>
          <div class="progress-bar-wrap">
            <div class="progress-bar"
                 role="progressbar"
                 aria-valuenow="95"
                 aria-valuemin="0"
                 aria-valuemax="100"></div>
          </div>
        </div>
        <div class="progress">
          <span class="skill">Python <i class="val">90%</i></span>
          <div class="progress-bar-wrap">
            <div class="progress-bar"
                 role="progressbar"
                 aria-valuenow="90"
                 aria-valuemin="0"
                 aria-valuemax="100"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- конец скиллов -->
{% endblock %}
